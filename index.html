<!DOCTYPE html>
<html lang="de" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memoiren - Mindmap</title>
    <!-- vis.js library -->
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Main Controls -->
    <div class="controls">
        <label>
            <input type="checkbox" id="connectSwitch"> Verbindungsmodus aktivieren
        </label>
        <div id="bubbleBasket" draggable="true">➕ Ziehen, um einen Gedanken hinzuzufügen</div>
    </div>

    <!-- Main Mindmap Container -->
    <div id="mindmap" style="width: 100vw; height: 100vh;"></div>

    <!-- Content Modal -->
    <div id="contentModal" class="modal">
        <div class="modal-content">
            <span id="closeContentModal" class="close-btn">&times;</span>
            <input type="text" id="bubbleTitleInput" placeholder="Gedankentitel...">
            
            <!-- Tabs -->
            <div class="tabs">
                <button class="tab-btn active" data-tab="tabQuickNotes">📝 Schnelle Notizen</button>
                <button class="tab-btn" data-tab="tabNotebooks">📓 Notizbücher</button>
                <button class="tab-btn" data-tab="tabAudios">🎙️ Audios</button>
                <button class="tab-btn" data-tab="tabPhotos">🖼️ Fotos</button>
                <button class="tab-btn" data-tab="tabInnerMindmap">🧠 Mindmap</button>
            </div>

            <!-- Tab Contents -->
            <div id="tabQuickNotes" class="tab-content active">
                <button id="addQuickNoteBtn" class="btn-primary">+ Notiz hinzufügen</button>
                <div id="quickNotesList"></div>
            </div>

            <div id="tabNotebooks" class="tab-content">
                <button id="addNotebookBtn" class="btn-primary">+ Notizbuch hinzufügen</button>
                <div id="notebooksList"></div>
            </div>

            <div id="tabAudios" class="tab-content">
                <div id="audiosList"></div>
            </div>

            <div id="tabPhotos" class="tab-content">
                <input type="file" id="imageInput" accept="image/*">
                <div id="photosList"></div>
            </div>

            <div id="tabInnerMindmap" class="tab-content">
                <!-- Inner mindmap tools and container injected via JS -->
            </div>
            
            <button id="deleteBubbleBtn" style="margin-top: 20px; background: red; color: white;">🗑️ Diesen Gedanken löschen</button>
        </div>
    </div>

    <!-- Notebook Modal -->
    <div id="notebookModal" class="modal">
        <div class="modal-content">
            <span id="closeNotebookModal" class="close-btn">&times;</span>
            <h3 id="activeNotebookTitle"></h3>
            <textarea id="notebookPageInput" rows="15" style="width: 100%;"></textarea>
            <div class="pagination">
                <button id="prevPageBtn">Zurück</button>
                <span id="pageIndicator"></span>
                <button id="nextPageBtn">Weiter / Neue Seite</button>
            </div>
        </div>
    </div>

    <!-- Move Element Modal -->
    <div id="moveModal" class="modal">
        <div class="modal-content">
            <h3>Element verschieben nach:</h3>
            <select id="targetBubbleSelect"></select>
            <button id="actionMoveBtn">Verschieben bestätigen</button>
            <button id="cancelMoveBtn">Abbrechen</button>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="confirmModal" class="modal">
        <div class="modal-content">
            <h3>Bist du sicher, dass du löschen möchtest?</h3>
            <button id="actionConfirmBtn" style="background: red; color: white;">Löschen bestätigen</button>
            <button id="cancelConfirmBtn">Abbrechen</button>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
